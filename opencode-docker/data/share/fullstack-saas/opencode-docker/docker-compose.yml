version: '3.9'

services:
  opencode:
    image: ghcr.io/pilinux/opencode:latest
    container_name: opencode
    environment:
      TZ: "America/Bogota"
      OPENCODE_SERVER_USERNAME: "admin"
      OPENCODE_SERVER_PASSWORD: "password123"
    volumes:
      - ./data/share:/home/opencode/.local/share/opencode
      - ./data/state:/home/opencode/.local/state/opencode
      - ./data/config:/home/opencode/.config/opencode
    ports:
      - "4096:4096"
    command: ["opencode", "serve", "--port", "4096", "--hostname", "0.0.0.0"]